# ─────────────────────────────────────────────────────────────
#  Memos by MelvinOS — CI
#  Runs on every PR + push to main: typecheck + build
# ─────────────────────────────────────────────────────────────

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - run: npx tsc --noEmit
      - run: npm run build
